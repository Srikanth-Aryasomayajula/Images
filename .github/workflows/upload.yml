name: Image Upload API

on:
  issues:
    types: [opened]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Save image + update JSON
        run: |
          echo '${{ github.event.client_payload.image }}' | base64 --decode > images/${{ github.event.client_payload.filename }}

          FILE="data.json"

          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". + [{
            file: \"images/${{ github.event.client_payload.filename }}\",
            caption: \"${{ github.event.client_payload.caption }}\"
          }]" $FILE > tmp.json

          mv tmp.json $FILE

      - name: Commit changes
        run: |
          git config user.name "image-vault-bot"
          git config user.email "bot@users.noreply.github.com"

          git add .
          git commit -m "upload image"
          git push

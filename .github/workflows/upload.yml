name: Image Vault Upload

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Process upload issue
        run: |
          echo "🚀 Processing issue..."

          echo '${{ github.event.issue.body }}' > payload.json

          cat payload.json

          FILENAME=$(jq -r '.filename' payload.json)
          CAPTION=$(jq -r '.caption' payload.json)
          IMAGE=$(jq -r '.image' payload.json)

          echo "📄 Filename: $FILENAME"
          echo "📝 Caption: $CAPTION"

          if [ ! -d "images" ]; then
            mkdir images
          fi

          echo "$IMAGE" | base64 --decode > "images/$FILENAME"

          FILE="data.json"

          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". + [{
            file: \"images/$FILENAME\",
            caption: \"$CAPTION\"
          }]" $FILE > tmp.json

          mv tmp.json $FILE

          echo "✅ Files updated"

      - name: Commit changes
        run: |
          git config user.name "image-vault-bot"
          git config user.email "bot@users.noreply.github.com"

          git add images data.json

          git commit -m "upload image" || echo "No changes to commit"

          git push

      - name: Close issue
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            -d '{"state":"closed"}'

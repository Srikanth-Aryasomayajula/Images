<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Memory Vault</title>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>📁 Image Memory Vault</header>

<div class="container">

    <!-- Upload -->
    <div class="upload-box">
        <h3>Upload Image</h3>
        <input type="file" id="imgInput" accept="image/*"/>
        <input type="text" id="captionInput" placeholder="Enter caption (e.g. aloe plant rot, kitchen table plant)..."/>
        <button onclick="uploadImage()">Save Image</button>
    </div>

    <!-- Search -->
    <div class="search-box">
        <h3>Search Images</h3>
        <input type="text" id="searchInput" oninput="renderImages()" placeholder="Type description..."/>
    </div>

    <!-- Gallery -->
    <div class="grid" id="gallery"></div>

</div>

<script src="script.js"></script>
</body>
</html>
